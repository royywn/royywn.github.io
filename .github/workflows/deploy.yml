# Build + deploy to GitHub Pages on push to main (ARCHITECTURE.md, ADR-002).
# Pipeline: convert notebooks → astro check → astro build (+pagefind postbuild)
# → lychee link check on dist → deploy.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install converter dependencies
        run: pip install nbconvert nbformat pyyaml

      - name: Install dependencies
        run: npm ci

      - name: Convert notebooks
        run: npm run convert

      - name: Type & content-schema check
        run: npx astro check

      - name: Build (convert + astro build + pagefind)
        run: npm run build

      - name: Link check on dist
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir ${{ github.workspace }}/dist --include-fragments 'dist/**/*.html'
          fail: true

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
